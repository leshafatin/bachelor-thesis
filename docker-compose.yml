services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: render-lab-app
    environment:
      NODE_ENV: production
      PORT: 3000
      DB_PATH: /data/db.sqlite
    expose:
      - "3000"
    volumes:
      - render_lab_data:/data
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: render-lab-nginx
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./deploy/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped

volumes:
  render_lab_data:
